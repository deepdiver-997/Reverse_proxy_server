[listen]
address = "0.0.0.0"
port = 8080
quic_port = 8443
num_threads = 1

[[backends]]
id = "app1"
host = "127.0.0.1"
port = 3000

[[backends]]
id = "app2"
host = "127.0.0.1"
port = 3001

[[routes]]
host = "app1.local"
backend = "app1"

[[routes]]
host = "app2.local"
backend = "app2"

[[routes]]
host = "*"
backend = "app1"
